name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Per `31-operations.md §5.2`
# Cancel in-progress runs on PR push.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: 1
  FORCE_COLOR: 3

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      pnpm-store-path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

  lint:
    name: Lint + Format
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Prettier check
        run: pnpm format:check
      - name: Turbo lint
        run: pnpm lint

  typecheck:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    name: Unit + integration tests
    runs-on: ubuntu-latest
    needs: setup
    services:
      postgres:
        # pgvector/pgvector:pg17 — we need pgvector + ltree + citext extensions
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: shopio
          POSTGRES_PASSWORD: shopio_test_password
          POSTGRES_DB: shopio_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U shopio"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      DATABASE_URL: postgres://shopio:shopio_test_password@localhost:5432/shopio_test
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  e2e:
    name: E2E (storefront purchase flow)
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: shopio
          POSTGRES_PASSWORD: shopio_test_password
          POSTGRES_DB: shopio_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U shopio"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://shopio:shopio_test_password@localhost:5432/shopio_test
      NODE_ENV: development
      SHOPIO_JWT_SECRET: e2e_jwt_secret_at_least_32_chars_long_for_dev_only
      SHOPIO_SESSION_PEPPER: e2e_pepper_at_least_16_chars
      SHOPIO_BASE_URL: http://localhost:3030
      SHOPIO_ADMIN_URL: http://localhost:3031
      SHOPIO_API_URL: http://localhost:4040
      CORS_ORIGIN: http://localhost:3030,http://localhost:3031
      LOG_LEVEL: warn
      API_URL: http://localhost:4040
      STOREFRONT_URL: http://localhost:3030
      NEXT_PUBLIC_SHOPIO_API_URL: http://localhost:4040
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Run migrations
        run: pnpm db:migrate

      - name: Seed database
        run: pnpm db:seed

      - name: Start API (background)
        run: pnpm --filter @shopio/api dev &
        env:
          NODE_ENV: development

      - name: Wait for API to be ready
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:4040/health/live > /dev/null; then
              echo "API ready"
              exit 0
            fi
            sleep 2
          done
          echo "API failed to start" >&2
          exit 1

      - name: Install Playwright browsers
        run: pnpm --filter @shopio/storefront exec playwright install --with-deps chromium

      - name: Run e2e tests
        run: pnpm --filter @shopio/storefront test:e2e
        env:
          CI: 'true'

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/storefront/playwright-report/
          retention-days: 7

  security-scan:
    name: Security scans
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: npm audit (high+)
        run: pnpm audit --audit-level high
        continue-on-error: true # log; don't block until established

  all-green:
    name: All checks passed
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, build, e2e, security-scan]
    steps:
      - run: echo "All CI checks green."
