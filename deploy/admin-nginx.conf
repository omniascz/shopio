# Shopio Admin SPA — static serving with history-API fallback.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Hashed assets — cache forever
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # SPA routes (TanStack Router) → index.html
  location / {
    add_header Cache-Control "no-cache";
    try_files $uri /index.html;
  }
}
